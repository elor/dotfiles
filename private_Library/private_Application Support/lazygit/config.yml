confirmOnQuit: false
promptToReturnFromSubprocess: false
os:
  editPreset: "nvim"
customCommands:
  - key: "<c-a>"
    context: "files"
    description: "AI: propose commit message (Claude)"
    command: "~/.local/bin/lazygit-ai-commit"
    output: terminal
  - key: "<c-x>"
    context: "commits"
    description: "declaude: strip Claude co-authorship from local commits"
    command: "~/.local/bin/declaude fix --local"
    output: terminal
